# Pipeline Metadata 模板
# 用于跟踪流水线执行状态和调试
# 复制此文件并填入实际值

pipeline_id: "{{ PIPELINE_ID }}"  # 流水线执行 ID，格式: YYYY-MM-DD-001
start_time: "{{ START_TIME }}"    # 开始执行时间，格式: 2025-03-07T10:30:00
user_id: "{{ USER_ID }}"          # 用户 ID（可选）

# 当前执行状态
execution:
  current_stage: "draft"                    # 当前阶段: planner|generator|reviewer|seo|converter|publish|repurpose|analytics
  status: "in_progress"                     # 状态: pending|in_progress|completed|failed|paused
  retry_count: 0                            # 当前阶段重试次数
  max_retries: 3                            # 最大重试次数
  error_message: null                       # 错误信息（如果失败）

# 文章元数据
article:
  title: ""                                 # 文章标题
  description: ""                           # 文章摘要/描述
  file_path: ""                             # Markdown 文件路径
  file_size_kb: 0                           # 文件大小（KB）
  word_count: 0                             # 字数
  tags: []                                  # 标签列表
  status: "draft"                           # 文章状态: draft|under_review|ready|published

# 各阶段执行记录
stages:
  # 阶段 1: 选题规划
  content_planner:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"                       # pending|completed|skipped|failed
    output_file: null                       # 输出文件路径
    error: null

  # 阶段 2: 文章生成
  article_generator:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"
    output_file: null                       # 生成的 Markdown 文件
    images_count: 0                         # 生成/添加的图片数
    error: null

  # 阶段 3: 内容审查
  content_reviewer:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"
    scores:                                 # 7 维评分
      readability: 0                        # 可读性
      logic_flow: 0                         # 逻辑流
      title_appeal: 0                       # 标题吸引力
      factual_accuracy: 0                   # 事实准确性
      ai_traces: 0                          # AI 痕迹
      platform_fit: 0                       # 平台适配
      originality: 0                        # 原创性
    total_score: 0                          # 总分（满分 70）
    passed: false                           # 是否通过（≥ 55 分）
    suggestions: []                         # 修改建议
    error: null

  # 阶段 4: SEO 优化
  wechat_seo_optimizer:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"
    title_options: []                       # 标题方案列表
    selected_title: null                    # 最终选定的标题
    keywords: []                            # 提取的关键词
    digest: null                            # 最终摘要
    cover_image: null                       # 建议的封面图
    user_confirmed: false                   # 用户是否已确认
    error: null

  # 阶段 5: 格式转换与上传
  wechat_article_converter:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"
    theme: "coffee"                         # 使用的主题
    html_output: null                       # 生成的 HTML 文件路径
    draft_media_id: null                    # 草稿箱 media_id
    images_uploaded: 0                      # 上传的图片数
    error: null

  # 阶段 6: 正式发布
  publish:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"
    msg_data_id: null                       # 已发布消息 ID
    published_url: null                     # 发布后的文章 URL
    publish_time: null                      # 发布时间
    user_confirmed: false                   # 用户是否已确认发布
    error: null

  # 阶段 7: 多平台分发
  content_repurposer:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"
    platforms:                              # 各平台分发情况
      xiaohongshu:
        published: false
        url: null
        status: null
      twitter:
        published: false
        url: null
        status: null
      zhihu:
        published: false
        url: null
        status: null
      newsletter:
        published: false
        url: null
        status: null
    error: null

  # 阶段 8: 数据分析
  content_analytics:
    executed: false
    start_time: null
    end_time: null
    duration_seconds: 0
    status: "pending"
    days_after_publish: 0                   # 发布后天数
    data:
      views: 0                              # 阅读数
      likes: 0                              # 赞数
      shares: 0                             # 分享数
      comments: 0                           # 评论数
      ctr: 0.0                              # 点击率
    insights: []                            # 数据洞察
    recommendations: []                     # 建议
    error: null

# 用户确认节点记录
confirmations:
  seo_title_confirmed: false
  seo_title_confirmed_at: null
  preview_confirmed: false
  preview_confirmed_at: null
  publish_confirmed: false
  publish_confirmed_at: null

# 异常和重试记录
error_history:
  # 示例:
  # - stage: "content_reviewer"
  #   error: "Score < 55, need revision"
  #   timestamp: "2025-03-07T10:35:00"
  #   retry_count: 1

# 流水线总体统计
summary:
  total_duration_seconds: 0                 # 总执行时间（秒）
  stages_completed: 0                       # 完成的阶段数
  stages_total: 8                           # 总阶段数
  completion_percentage: 0                  # 完成百分比
  success: false                            # 是否成功完成
  final_status: "in_progress"               # 最终状态
  notes: ""                                 # 备注
